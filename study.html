<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 투자 공부 노트</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #F4F1EA; --card: #fff; --border: #E0DCD2;
  --text: #2C2A26; --sub: #7A766C; --accent: #C9572E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; background: var(--bg); color: var(--text); }

.header { background: var(--accent); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-title { font-size: 20px; font-weight: 800; }
.header-back { color: #fff; text-decoration: none; font-size: 13px; font-weight: 700; padding: 6px 12px; border: 1.5px solid rgba(255,255,255,0.6); border-radius: 8px; }

.progress-bar { background: #fff; padding: 12px 24px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 16px; }
.progress-label { font-size: 13px; color: var(--sub); white-space: nowrap; }
.progress-track { flex: 1; background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; }
.progress-fill { background: var(--accent); height: 100%; border-radius: 10px; transition: width 0.5s; }
.progress-text { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }

.tab-bar { display: flex; overflow-x: auto; background: #fff; border-bottom: 2px solid var(--border); padding: 0 12px; gap: 4px; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 12px 16px; border: none; background: none; font-size: 13px; font-weight: 700; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.content { padding: 24px 32px; max-width: 2000px; margin: 0 auto; }
.part-section { display: none; }
.part-section.active { display: block; }

/* 파트 헤더 */
.part-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--card); border-radius: 16px; padding: 20px 24px; margin-bottom: 24px; border-left: 5px solid var(--accent); }
.part-header-left { flex: 1; }
.part-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.part-desc { font-size: 14px; color: var(--sub); line-height: 1.6; }
.complete-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--sub); white-space: nowrap; flex-shrink: 0; }
.complete-btn.done { border-color: #2A9D8F; color: #2A9D8F; background: #f0faf8; }
.complete-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.complete-btn.done .complete-check { background: #2A9D8F; border-color: #2A9D8F; color: #fff; }

/* 핵심 개념 행 - 개념카드 + 메모/링크 나란히 */
.concept-row {
  display: grid;
  grid-template-columns: 380px 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
  align-items: start;
}
.concept-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.concept-term { font-size: 15px; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
.concept-def { font-size: 13px; line-height: 1.7; }
.concept-example { font-size: 12px; color: var(--sub); margin-top: 8px; background: #f9f7f4; padding: 8px 10px; border-radius: 8px; line-height: 1.6; }

/* 오른쪽: 메모+링크 패널 */
.concept-right {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  min-height: 80px;
}
.concept-right-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.cr-tab { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--sub); }
.cr-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.cr-memo-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.cr-memo-item { background: #f9f7f4; border-radius: 8px; padding: 8px 10px; font-size: 13px; line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
.cr-memo-text { flex: 1; white-space: pre-wrap; word-break: break-word; }
.cr-del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 13px; flex-shrink: 0; padding: 0; line-height: 1; }
.cr-del-btn:hover { color: var(--accent); }

.cr-link-item { display: flex; align-items: center; gap: 8px; background: #f9f7f4; border-radius: 8px; padding: 7px 10px; margin-bottom: 6px; text-decoration: none; color: var(--text); }
.cr-link-title { font-size: 13px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.cr-input-row { display: flex; gap: 6px; margin-top: 6px; }
.cr-input-row input, .cr-input-row textarea { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; }
.cr-save-btn { padding: 7px 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; }

/* 섹션 구분 */
.section-divider { margin: 28px 0 16px; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.section-divider::after { content: ''; flex: 1; height: 2px; background: var(--border); }

/* AI 버튼 */
.ai-btn { width: 100%; padding: 13px; background: #457B9D; color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 24px; }

/* 투자 원칙 */
.principles-box { background: var(--card); border: 2px solid var(--accent); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.principles-content { font-size: 14px; line-height: 1.9; white-space: pre-wrap; min-height: 60px; color: var(--sub); }

/* 일기 */
.diary-add { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.diary-add textarea { width: 100%; min-height: 90px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; margin-bottom: 8px; }
.diary-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.diary-date { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
.diary-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }

.btn-primary { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📚 투자 공부 노트</div>

</div>

<div class="content" id="main-content"></div>

<script>

// ===== 공부 데이터 =====
var PARTS = [
  {
    id: "basic", title: "📊 주식 기본 지식", color: "#C9572E",
    desc: "기업의 가치를 숫자로 읽는 법. PER·PBR·ROE·EPS를 이해하면 좋은 주식과 나쁜 주식을 구별할 수 있어요.",
    aiPrompt: "주식 투자의 기본 지식인 PER, PBR, ROE, EPS, 재무제표를 쉽고 친근하게 설명해줘. 실생활 예시를 들어서, 실제 투자에서 어떻게 활용하는지 알려줘. 친구한테 얘기하듯 한국어로.",
    concepts: [
      { id: "per", term: "PER (주가수익비율)", def: "주가 ÷ 주당순이익(EPS). 이 주식이 이익 대비 얼마나 비싼지 나타내요.", example: "💡 PER 10 = 지금 이 가격이면 10년치 이익으로 본전. PER이 낮을수록 상대적으로 저렴. 단, 업종별 평균을 비교해야 의미가 있어요." },
      { id: "pbr", term: "PBR (주가순자산비율)", def: "주가 ÷ 주당순자산. 회사 자산 대비 주가가 얼마인지 보여줘요.", example: "💡 PBR 1 미만 = 회사를 지금 청산해도 주가보다 많이 받을 수 있다는 의미. 저평가 신호일 수 있어요." },
      { id: "roe", term: "ROE (자기자본이익률)", def: "순이익 ÷ 자기자본 × 100. 내 돈으로 얼마나 잘 벌었는지 측정해요.", example: "💡 ROE 15% 이상이면 우량 기업. 워런 버핏은 ROE 15% 이상 기업만 투자했어요." },
      { id: "eps", term: "EPS (주당순이익)", def: "순이익 ÷ 총 발행 주식수. 주식 1주가 1년에 얼마를 버는지 나타내요.", example: "💡 EPS가 꾸준히 증가하는 기업 = 실적이 성장하는 기업. PER 계산의 기초가 돼요." },
      { id: "financial", term: "재무제표 3가지", def: "① 손익계산서(얼마 벌었나) ② 재무상태표(얼마 갖고 있나) ③ 현금흐름표(돈이 실제로 들어왔나)", example: "💡 이익이 있어도 현금흐름이 마이너스면 위험신호. 네이버 증권 재무 탭에서 확인 가능해요." },
    ]
  },
  {
    id: "macro", title: "🌍 거시경제 흐름", color: "#457B9D",
    desc: "금리·환율·원자재가 주식시장에 미치는 영향. 큰 그림을 알면 파도를 타는 것이 가능해요.",
    aiPrompt: "거시경제가 주식시장에 미치는 영향을 쉽게 설명해줘. 금리·환율·CPI·PMI·FOMC가 주가에 어떻게 연결되는지, 실제 사례를 들어서 이해하기 쉽게 알려줘. 친구한테 얘기하듯 한국어로.",
    concepts: [
      { id: "rate", term: "금리와 주가의 관계", def: "금리↑ → 대출 부담 증가, 채권 매력 증가 → 주식에서 돈 빠짐 → 주가 하락 경향", example: "💡 2022년 미국 금리 급등 시 나스닥 -33% 폭락이 대표적 예시. 금리↑=주가↓ 기본 공식." },
      { id: "fx", term: "환율과 수출기업", def: "원화 약세(달러 강세) → 수출기업 실적 좋아짐. 반대로 원화 강세 → 수출기업 불리.", example: "💡 삼성전자·현대차는 원달러 환율 오르면 실적 개선. 환율 1,400원 vs 1,200원 차이가 엄청남." },
      { id: "fed", term: "연준(Fed)과 FOMC", def: "미국 중앙은행. 1년에 8번 FOMC 회의에서 금리 결정. 전 세계 금융시장에 가장 큰 영향.", example: "💡 FOMC 발표 날은 시장이 크게 움직임. '점도표'로 앞으로 금리 방향을 예측할 수 있어요." },
      { id: "cpi", term: "CPI (소비자물가지수)", def: "물가 상승률 측정. 인플레이션 수치. 매월 미국 발표 시 시장이 크게 반응해요.", example: "💡 CPI가 예상보다 높게 나오면 → 금리 더 올릴 수 있다 → 주가 하락. 낮으면 → 금리 인하 기대 → 주가 상승." },
      { id: "pmi", term: "PMI (구매관리자지수)", def: "기업 구매담당자들의 경기 체감지수. 50 이상 = 경기 확장, 50 미만 = 경기 축소.", example: "💡 중국 PMI가 중요한 이유: 한국은 중국 수출 의존도가 높아서 중국 경기 좋으면 한국 증시도 좋아지는 경향." },
      { id: "cycle", term: "경기 사이클 4단계", def: "① 회복기 → ② 확장기 → ③ 후퇴기 → ④ 침체기. 각 단계마다 잘 오르는 섹터가 달라요.", example: "💡 회복기: 금융·부동산 / 확장기: 기술·소비재 / 후퇴기: 헬스케어 / 침체기: 현금·채권" },
    ]
  },
  {
    id: "chart", title: "📈 차트/기술적 분석", color: "#2A9D8F",
    desc: "차트로 매수·매도 타이밍을 잡는 방법. 이동평균선과 거래량만 봐도 큰 흐름이 보여요.",
    aiPrompt: "주식 차트 기술적 분석을 초보자도 이해할 수 있게 설명해줘. 이동평균선, 지지/저항선, 거래량, RSI, 캔들 패턴을 실전에서 어떻게 활용하는지 알려줘. 친구한테 얘기하듯 한국어로.",
    concepts: [

      { id: "support", term: "지지선과 저항선", def: "지지선 = 주가가 반복적으로 튀어오르는 가격대. 저항선 = 반복적으로 막히는 가격대.", example: "💡 저항선을 뚫고 올라가면 그 저항선이 지지선으로 바뀜. 이 원리로 매수 타이밍을 잡아요." },
      { id: "volume", term: "거래량", def: "하루에 거래된 주식 수. 주가 변동의 신뢰도를 판단하는 핵심 지표.", example: "💡 주가 상승 + 거래량 증가 = 신뢰할 수 있는 상승. 주가 상승 + 거래량 감소 = 힘이 약한 상승, 주의." },
      { id: "rsi", term: "RSI (상대강도지수)", def: "0~100 수치. 70 이상 = 과매수, 30 이하 = 과매도.", example: "💡 RSI 30 이하면 반등 가능성 높음. 하지만 하락장에서는 RSI 낮아도 계속 떨어질 수 있으니 주의." },
      { id: "candle", term: "캔들 차트 읽기", def: "빨간봉 = 상승, 파란봉 = 하락. 봉의 몸통과 꼬리로 하루의 매수·매도 싸움을 볼 수 있어요.", example: "💡 긴 윗꼬리 = 고점에서 매도세 강함. 긴 아랫꼬리 = 저점에서 매수세 강함. 장대 양봉 = 강한 상승신호." },
    ]
  },
  {
    id: "strategy", title: "💡 투자 전략", color: "#C9572E",

    aiPrompt: "주식 투자 전략에서 가장 중요한 것들을 알려줘. 분할매수, 손절 기준, 섹터 로테이션, 포트폴리오 구성, 매도 전략을 실전 예시와 함께 쉽게 설명해줘. 친구한테 얘기하듯 한국어로.",
    concepts: [
      { id: "split_buy", term: "분할매수", def: "한 번에 다 사지 않고 나눠서 사는 전략. 평균 단가를 낮추는 효과.", example: "💡 100만원 투자 시 → 30만원 먼저 사고 → 떨어지면 30만원 추가 → 더 떨어지면 40만원 추가. 바닥을 알 수 없으니 나눠서." },

// ===== 상태 =====
var studyData = {}; // Firebase 데이터
var completed = {};
var activePart = "basic";
var activeConceptTab = {}; // conceptId -> "memo" | "link"

// ===== 탭 전환 =====
document.getElementById("tab-bar").addEventListener("click", function(e) {
  var btn = e.target.closest(".tab-btn");
  if (!btn) return;
  document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  activePart = btn.dataset.part;
  renderContent();
});

// ===== 렌더링 =====
function renderContent() {
  var container = document.getElementById("main-content");
  container.innerHTML = "";

  if (activePart === "diary") {
    renderDiarySection(container);
    return;
  }

  var part = PARTS.find(function(p) { return p.id === activePart; });
  if (!part) return;

  // 파트 헤더
  var header = document.createElement("div");
  header.className = "part-header";
  header.style.borderLeftColor = part.color;
  header.innerHTML =
    '<div class="part-header-left">' +
      '<div class="part-title" style="color:' + part.color + ';">' + part.title + '</div>' +
      '<div class="part-desc">' + part.desc + '</div>' +
    '</div>' +
    '<button class="complete-btn' + (completed[part.id] ? ' done' : '') + '" onclick="toggleComplete(\'' + part.id + '\')">' +
      '<div class="complete-check">' + (completed[part.id] ? '✓' : '') + '</div>' +
      (completed[part.id] ? '✅ 학습 완료!' : '완료 체크') +
    '</button>';
  container.appendChild(header);

  // AI 버튼
  var aiBtn = document.createElement("button");
  aiBtn.className = "ai-btn";
  aiBtn.textContent = "🤖 이 파트 Claude AI에게 질문하기 →";
  aiBtn.onclick = function() {
    window.open("https://claude.ai/new?q=" + encodeURIComponent(part.aiPrompt), "_blank");
  };
  container.appendChild(aiBtn);

  // 핵심 개념 행들
  var divider = document.createElement("div");
  divider.className = "section-divider";
  divider.innerHTML = '📖 핵심 개념';
  container.appendChild(divider);

  part.concepts.forEach(function(concept) {
    renderConceptRow(container, part.id, concept, part.color);
  });
}

function renderConceptRow(container, partId, concept, color) {
  var row = document.createElement("div");
  row.className = "concept-row";
  row.id = "row-" + partId + "-" + concept.id;

  // 왼쪽: 개념 카드
  var card = document.createElement("div");
  card.className = "concept-card";
  card.style.borderTop = "3px solid " + color;
  card.innerHTML =
    '<div class="concept-term" style="color:' + color + ';">' + concept.term + '</div>' +
    '<div class="concept-def">' + concept.def + '</div>' +
    '<div class="concept-example">' + concept.example + '</div>';

  // 가운데: 메모 패널
  var memoPanel = document.createElement("div");
  memoPanel.className = "concept-right";
  memoPanel.id = "memo-panel-" + partId + "-" + concept.id;
  memoPanel.innerHTML = '<div style="font-size:13px;font-weight:800;color:var(--accent);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border);">📝 메모</div>';

  var memoBody = document.createElement("div");
  memoBody.id = "memo-body-" + partId + "-" + concept.id;
  memoPanel.appendChild(memoBody);

  // 오른쪽: 링크 패널
  var linkPanel = document.createElement("div");
  linkPanel.className = "concept-right";
  linkPanel.id = "link-panel-" + partId + "-" + concept.id;
  linkPanel.innerHTML = '<div style="font-size:13px;font-weight:800;color:#457B9D;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border);">🔗 참고 링크</div>';

  var linkBody = document.createElement("div");
  linkBody.id = "link-body-" + partId + "-" + concept.id;
  linkPanel.appendChild(linkBody);

  row.appendChild(card);
  row.appendChild(memoPanel);
  row.appendChild(linkPanel);
  container.appendChild(row);

  // 초기 렌더
  renderMemoPanel(memoBody, partId, concept.id);
  renderLinkPanel(linkBody, partId, concept.id, color);
}

function renderMemoPanel(body, partId, conceptId) {
  var key = partId + "-" + conceptId;
  body.innerHTML = "";

  // 메모 목록
  var memos = studyData.memos && studyData.memos[key] ? studyData.memos[key] : {};
  var memoItems = Object.keys(memos).map(function(k) { return Object.assign({ _id: k }, memos[k]); })
    .sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

  if (memoItems.length > 0) {
    var list = document.createElement("div");
    list.className = "cr-memo-list";
    memoItems.forEach(function(m) {
      var item = document.createElement("div");
      item.className = "cr-memo-item";
      item.innerHTML =
        '<span class="cr-memo-text">' + (m.text || "").replace(/</g,"&lt;") + '</span>' +
        '<button class="cr-del-btn" onclick="delMemo(\'' + key + '\',\'' + m._id + '\')">✕</button>';
      list.appendChild(item);
    });
    body.appendChild(list);
  }

  // 메모 입력
  var ta = document.createElement("textarea");
  ta.placeholder = "메모 입력... (Ctrl+Enter 저장)";
  ta.style.cssText = "width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;margin-top:6px;";
  var btn = document.createElement("button");
  btn.textContent = "💾 메모 저장";
  btn.style.cssText = "width:100%;margin-top:6px;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;";
  btn.onclick = function() {
    var text = ta.value.trim();
    if (!text) { alert("메모 내용을 입력해주세요."); return; }
    addMemo(key, text);
    ta.value = "";
  };
  ta.addEventListener("keydown", function(e) { if (e.ctrlKey && e.key === "Enter") btn.click(); });
  body.appendChild(ta);
  body.appendChild(btn);
}

function renderLinkPanel(body, partId, conceptId, color) {
  var key = partId + "-" + conceptId;
  body.innerHTML = "";

  // 링크 목록
  var links = studyData.links && studyData.links[key] ? studyData.links[key] : {};
  var linkItems = Object.keys(links).map(function(k) { return Object.assign({ _id: k }, links[k]); })
    .sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

  if (linkItems.length > 0) {
    linkItems.forEach(function(l) {
      var isYt = /youtube\.com|youtu\.be/.test(l.url || "");
      var a = document.createElement("a");
      a.className = "cr-link-item";
      a.href = l.url || "#";
      a.target = "_blank";
      a.innerHTML =
        '<span style="font-size:16px;">' + (isYt ? "▶" : "🔗") + '</span>' +
        '<span class="cr-link-title">' + (l.title || "").replace(/</g,"&lt;") + '</span>' +
        '<button onclick="event.preventDefault();delLink(\'' + key + '\',\'' + l._id + '\')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;">✕</button>';
      body.appendChild(a);
    });
  }

  // 링크 입력
  var titleInput = document.createElement("input");
  titleInput.type = "text";
  titleInput.placeholder = "링크 제목";
  titleInput.style.cssText = "width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;margin-top:6px;display:block;";
  var urlInput = document.createElement("input");
  urlInput.type = "url";
  urlInput.placeholder = "URL (https://...)";
  urlInput.style.cssText = "width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;margin-top:6px;display:block;";
  var linkBtn = document.createElement("button");
  linkBtn.textContent = "🔗 링크 저장";
  linkBtn.style.cssText = "width:100%;margin-top:6px;padding:10px;background:#457B9D;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;";
  linkBtn.onclick = function() {
    var t = titleInput.value.trim();
    var u = urlInput.value.trim();
    if (!t || !u) { alert("제목과 URL을 모두 입력해주세요."); return; }
    if (!u.startsWith("http")) u = "https://" + u;
    addLink(key, t, u);
    titleInput.value = ""; urlInput.value = "";
  };
  urlInput.addEventListener("keydown", function(e) { if (e.key === "Enter") linkBtn.click(); });
  body.appendChild(titleInput);
  body.appendChild(urlInput);
  body.appendChild(linkBtn);
}

  container.appendChild(list);
}

// ===== Firebase CRUD =====
function addMemo(key, text) {
  text = (text || "").trim();
  if (!text) return;
  studyRef.child("memos/" + key).push({ text: text, createdAt: Date.now() })
    .then(function() {
      console.log("메모 저장 성공:", key, text);
    })
    .catch(function(err) {
      console.error("메모 저장 실패:", err);
      alert("저장 실패: " + err.message + "\n\nFirebase 규칙을 확인해주세요.");
    });
}

function delMemo(key, id) {
  if (!confirm("메모를 삭제하시겠습니까?")) return;
  studyRef.child("memos/" + key + "/" + id).remove();
}

function addLink(key, title, url) {
  studyRef.child("links/" + key).push({ title: title, url: url, createdAt: Date.now() })
    .then(function() {
      console.log("링크 저장 성공:", key, title, url);
    })
    .catch(function(err) {
      console.error("링크 저장 실패:", err);
      alert("저장 실패: " + err.message + "\n\nFirebase 규칙을 확인해주세요.");
    });
}

function delLink(key, id) {
  if (!confirm("링크를 삭제하시겠습니까?")) return;
  studyRef.child("links/" + key + "/" + id).remove();
}

function addDiary() {
  var ta = document.getElementById("diary-input");
  if (!ta) return;
  var text = ta.value.trim();
  if (!text) return;
  var today = new Date();
  var dateStr = today.getFullYear() + "." + String(today.getMonth()+1).padStart(2,"0") + "." + String(today.getDate()).padStart(2,"0");
  studyRef.child("diary").push({ text: text, date: dateStr, createdAt: Date.now() });
  ta.value = "";
}

function delDiary(id) {
  if (!confirm("기록을 삭제하시겠습니까?")) return;
  studyRef.child("diary/" + id).remove();
}

function toggleComplete(partId) {
  completed[partId] = !completed[partId];
  studyRef.child("completed/" + partId).set(completed[partId]);
  updateProgress();
  renderContent();
}

function updateProgress() {
  var parts = PARTS.map(function(p) { return p.id; });
  var done = parts.filter(function(p) { return completed[p]; }).length;
  var pct = Math.round(done / parts.length * 100);
  document.getElementById("progress-text").textContent = done + " / " + parts.length + " 완료";
  document.getElementById("progress-fill").style.width = pct + "%";
}

// ===== Firebase 실시간 동기화 =====
studyRef.on("value", function(snap) {
  studyData = snap.val() || {};
  var comp = studyData.completed || {};
  PARTS.forEach(function(p) { completed[p.id] = !!comp[p.id]; });
  updateProgress();

  // 전체 재렌더링 대신 현재 파트의 각 개념 패널만 부분 업데이트
  if (activePart === "diary") {
    renderContent();
    return;
  }
  var part = PARTS.find(function(p) { return p.id === activePart; });
  if (!part) return;

  // 완료 버튼만 업데이트
  var completeBtn = document.querySelector(".complete-btn");
  if (completeBtn) {
    completeBtn.className = "complete-btn" + (completed[part.id] ? " done" : "");
    completeBtn.querySelector(".complete-check").textContent = completed[part.id] ? "✓" : "";
    completeBtn.childNodes[1].textContent = completed[part.id] ? "✅ 학습 완료!" : "완료 체크";
  }

  // 각 개념 패널만 업데이트 (탭 상태 유지)
  part.concepts.forEach(function(concept) {
    var key = part.id + "-" + concept.id;
    var tab = activeConceptTab[key] || "memo";
    var rightEl = document.getElementById("cr-" + part.id + "-" + concept.id);
    if (rightEl) {
      renderConceptPanel(rightEl, part.id, concept.id, tab, part.color);
    }
  });
});
</script>
