<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 정보 모음 - 운전 중 듣기</title>
<style>
  :root {
    --bg: #F4F1EA;
    --card-bg: #FFFFFF;
    --border: #E0DCD2;
    --text-main: #2C2A26;
    --text-sub: #7A766C;
    --accent: #C9572E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text-main);
    padding: 24px 16px 60px;
    max-width: 480px;
    margin: 0 auto;
  }
  header { margin-bottom: 28px; }
  header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  header p { font-size: 14px; color: var(--text-sub); }
  .section { margin-bottom: 28px; }
  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 21px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }
  .card:active { transform: scale(0.98); }
  .card a {
    flex: 1;
    text-decoration: none;
    color: inherit;
    min-width: 0;
  }
  .card-text .name { font-size: 19px; font-weight: 800; margin-bottom: 2px; color: var(--text-main); }
  .card-text .desc { font-size: 12px; color: var(--text-sub); }
  .arrow { font-size: 18px; color: var(--text-sub); margin: 0 8px 0 12px; flex-shrink: 0; }
  .del-btn {
    margin-left: 4px;
    padding: 6px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text-sub);
    cursor: pointer;
    flex-shrink: 0;
  }
  .add-toggle {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    text-transform: none;
    letter-spacing: normal;
  }
  .section-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .move-btn {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    line-height: 1;
    cursor: pointer;
    text-transform: none;
    letter-spacing: normal;
  }
  .move-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }
  .add-form {
    display: none;
    flex-direction: column;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .add-form.open { display: flex; }
  .add-form input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
  }
  .add-form button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .add-form .hint { font-size: 12px; color: var(--text-sub); }
  footer { margin-top: 40px; font-size: 12px; color: var(--text-sub); text-align: center; }
</style>
</head>
<body>

<header>
  <h1>주식 정보 허브</h1>
  <p>운전하면서 들을 수 있는 시황·뉴스 모음. 각 섹션에서 자유롭게 추가/삭제할 수 있어요.</p>
</header>

          { name: "김경필의 머니트레이닝(필쌤TV)", desc: "소비·자산관리 등 돈 관리 기초 공부", url: "https://www.youtube.com/results?search_query=%ED%95%84%EC%8C%A4TV+%EA%B0%80%EC%A0%95%EA%B2%BD%EC%A0%9C" }

  // ---------- Firebase 설정 ----------
  var firebaseConfig = {
    apiKey: "AIzaSyCUfXHfU6Bi1aFI90izeI8mEH21yJv_Cac",
    authDomain: "stock-96d08.firebaseapp.com",
    databaseURL: "https://stock-96d08-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "stock-96d08",
    storageBucket: "stock-96d08.firebasestorage.app",
    messagingSenderId: "386185757176",
    appId: "1:386185757176:web:79e72e41e361af5399560d"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();
  var dbRef = db.ref("stockHub");

  var data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  var isFirstLoad = true;

  function saveData(d) {
    dbRef.set(d);
  }

  // 즉시 1차 렌더링 (Firebase 응답 전에도 화면이 비어있지 않도록)
  renderTickerTape();
  renderSections();

  // 실시간 동기화: 다른 기기에서 변경되면 자동으로 다시 그림
  dbRef.on("value", function (snapshot) {
    var val = snapshot.val();
    if (val && val.sections) {
      data = val;
    } else if (isFirstLoad) {
      // 데이터베이스가 비어있으면 기본 데이터로 초기화
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData(data);
    }
    isFirstLoad = false;
    renderTickerTape();
    renderSections();
  });

  // ---------- 관심 종목 시세 ----------
  var lastPrices = {}; // code -> 현재가(숫자)

  function renderTickerTape() {
    var outer = document.getElementById("tv-ticker-tape");
    outer.innerHTML = "";

    var stockSection = data.sections.filter(function (s) { return s.type === "stocks"; })[0];
    var stocks = stockSection ? stockSection.items : [];

    if (stocks.length === 0) {
      outer.innerHTML = '<p style="font-size:12px; color:var(--text-sub);">관심 종목을 추가하면 실시간 시세를 불러올 수 있습니다.</p>';
      return;
    }

    var refreshBtn = document.createElement("button");
    refreshBtn.textContent = "↻ 시세 불러오기";
    refreshBtn.style.width = "100%";
    refreshBtn.style.padding = "12px";
    refreshBtn.style.marginBottom = "10px";
    refreshBtn.style.border = "1px solid var(--border)";
    refreshBtn.style.borderRadius = "12px";
    refreshBtn.style.background = "var(--card-bg)";
    refreshBtn.style.color = "var(--accent)";
    refreshBtn.style.fontWeight = "700";
    refreshBtn.style.fontSize = "14px";
    refreshBtn.style.cursor = "pointer";
    refreshBtn.onclick = function () { fetchAllPrices(stocks, refreshBtn); };
    outer.appendChild(refreshBtn);

    var grandTotalBox = document.createElement("div");
    grandTotalBox.style.display = "flex";
    grandTotalBox.style.justifyContent = "space-between";
    grandTotalBox.style.alignItems = "center";
    grandTotalBox.style.background = "var(--accent)";
    grandTotalBox.style.borderRadius = "12px";
    grandTotalBox.style.padding = "14px 16px";
    grandTotalBox.style.marginBottom = "10px";

    var grandTotalLabel = document.createElement("div");
    grandTotalLabel.textContent = "보유 종목 합계";
    grandTotalLabel.style.fontSize = "14px";
    grandTotalLabel.style.fontWeight = "700";
    grandTotalLabel.style.color = "#fff";

    var grandTotalValue = document.createElement("div");
    grandTotalValue.id = "grand-total";
    grandTotalValue.textContent = "— (시세 불러오기 필요)";
    grandTotalValue.style.fontSize = "17px";
    grandTotalValue.style.fontWeight = "800";
    grandTotalValue.style.color = "#fff";

    grandTotalBox.appendChild(grandTotalLabel);
    grandTotalBox.appendChild(grandTotalValue);
    outer.appendChild(grandTotalBox);

    var wrap = document.createElement("div");
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.gap = "8px";
    wrap.style.marginBottom = "10px";

    stocks.forEach(function (s) {
      var row = document.createElement("div");
      row.style.display = "flex";
      row.style.justifyContent = "space-between";
      row.style.alignItems = "center";
      row.style.background = "var(--card-bg)";
      row.style.border = "1px solid var(--border)";
      row.style.borderRadius = "12px";
      row.style.padding = "12px 16px";
      row.style.gap = "10px";

      // 왼쪽: 종목명 + 보유수량 입력
      var left = document.createElement("div");
      left.style.display = "flex";
      left.style.flexDirection = "column";
      left.style.gap = "4px";

      var nameEl = document.createElement("div");
      nameEl.style.fontSize = "16px";
      nameEl.style.fontWeight = "800";
      nameEl.textContent = s.name;

      var qtyRow = document.createElement("div");
      qtyRow.style.display = "flex";
      qtyRow.style.alignItems = "center";
      qtyRow.style.gap = "6px";

      var qtyLabel = document.createElement("span");
      qtyLabel.textContent = "보유수량";
      qtyLabel.style.fontSize = "12px";
      qtyLabel.style.color = "var(--text-sub)";

      var qtyInput = document.createElement("input");
      qtyInput.type = "number";
      qtyInput.min = "0";
      qtyInput.value = s.qty || 0;
      qtyInput.style.width = "60px";
      qtyInput.style.padding = "4px 6px";
      qtyInput.style.fontSize = "13px";
      qtyInput.style.border = "1px solid var(--border)";
      qtyInput.style.borderRadius = "6px";

      var qtyBtn = document.createElement("button");
      qtyBtn.textContent = "저장";
      qtyBtn.style.fontSize = "12px";
      qtyBtn.style.padding = "4px 8px";
      qtyBtn.style.border = "1px solid var(--border)";
      qtyBtn.style.borderRadius = "6px";
      qtyBtn.style.background = "#fff";
      qtyBtn.style.color = "var(--accent)";
      qtyBtn.style.cursor = "pointer";
      qtyBtn.onclick = function () {
        var qty = parseInt(qtyInput.value, 10);
        if (isNaN(qty) || qty < 0) qty = 0;
        s.qty = qty;
        saveData(data);
        updateTotal(s.code);
      };

      qtyRow.appendChild(qtyLabel);
      qtyRow.appendChild(qtyInput);
      qtyRow.appendChild(qtyBtn);

      left.appendChild(nameEl);
      left.appendChild(qtyRow);

      // 오른쪽: 현재가 + 총액
      var right = document.createElement("div");
      right.style.display = "flex";
      right.style.flexDirection = "column";
      right.style.alignItems = "flex-end";
      right.style.gap = "2px";

      var priceEl = document.createElement("div");
      priceEl.style.fontSize = "15px";
      priceEl.style.fontWeight = "700";
      priceEl.style.color = "var(--text-sub)";
      priceEl.textContent = "—";
      priceEl.id = "price-" + s.code;

      var totalEl = document.createElement("div");
      totalEl.style.fontSize = "13px";
      totalEl.style.fontWeight = "700";
      totalEl.style.color = "var(--accent)";
      totalEl.textContent = (s.qty ? "총액 —" : "");
      totalEl.id = "total-" + s.code;

      right.appendChild(priceEl);
      right.appendChild(totalEl);

      row.appendChild(left);
      row.appendChild(right);
      wrap.appendChild(row);
    });

    outer.appendChild(wrap);
    updateGrandTotal();
  }

  function updateTotal(code) {
    var stockSection = data.sections.filter(function (s) { return s.type === "stocks"; })[0];
    var stock = stockSection.items.filter(function (s) { return s.code === code; })[0];
    var totalEl = document.getElementById("total-" + code);
    if (!stock || !totalEl) return;

    var price = lastPrices[code];
    var qty = stock.qty || 0;

    if (qty === 0) {
      totalEl.textContent = "";
    } else if (price == null) {
      totalEl.textContent = "총액 — (시세 불러오기 필요)";
    } else {
      totalEl.textContent = "총액 " + (price * qty).toLocaleString() + "원";
    }

    updateGrandTotal();
  }

  function updateGrandTotal() {
    var grandTotalValue = document.getElementById("grand-total");
    if (!grandTotalValue) return;

    var stockSection = data.sections.filter(function (s) { return s.type === "stocks"; })[0];
    var stocks = stockSection ? stockSection.items : [];

    var sum = 0;
    var hasQty = false;
    var allPricesReady = true;

    stocks.forEach(function (s) {
      var qty = s.qty || 0;
      if (qty > 0) {
        hasQty = true;
        var price = lastPrices[s.code];
        if (price == null) {
          allPricesReady = false;
        } else {
          sum += price * qty;
        }
      }
    });

    if (!hasQty) {
      grandTotalValue.textContent = "보유 수량을 입력해주세요";
    } else if (!allPricesReady) {
      grandTotalValue.textContent = "— (시세 불러오기 필요)";
    } else {
      grandTotalValue.textContent = sum.toLocaleString() + "원";
    }
  }

  // 야후 파이낸스 + CORS 프록시(여러 개 순차 시도)로 시세 조회
  function fetchYahoo(symbol, proxyIdx) {
    var target = "https://query1.finance.yahoo.com/v8/finance/chart/" + symbol;
    var proxies = [
      "https://corsproxy.io/?url=" + encodeURIComponent(target),
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(target),
      "https://thingproxy.freeboard.io/fetch/" + target
    ];
    if (proxyIdx >= proxies.length) {
      return Promise.reject(new Error("all proxies failed"));
    }
    return fetch(proxies[proxyIdx])
      .then(function (res) {
        if (!res.ok) throw new Error("bad status");
        return res.json();
      })
      .catch(function () {
        return fetchYahoo(symbol, proxyIdx + 1);
      });
  }

  function fetchAllPrices(stocks, btn) {
    if (btn) {
      btn.disabled = true;
      btn.textContent = "불러오는 중...";
    }

    stocks.forEach(function (s) {
      var priceEl = document.getElementById("price-" + s.code);
      if (priceEl) {
        priceEl.style.color = "var(--text-sub)";
        priceEl.textContent = "로딩중...";
      }
    });

    var symbol;
    var promises = stocks.map(function (s) {
      symbol = s.code + ".KS";
      return fetchYahoo(symbol, 0)
        .then(function (json) {
          var result = json.chart && json.chart.result && json.chart.result[0];
          var meta = result && result.meta;
          var priceEl = document.getElementById("price-" + s.code);
          if (!priceEl) return;
          if (meta && typeof meta.regularMarketPrice === "number") {
            var price = meta.regularMarketPrice;
            var prevClose = meta.previousClose || meta.chartPreviousClose;
            var diff = prevClose ? price - prevClose : 0;
            var pct = prevClose ? (diff / prevClose * 100) : 0;
            var sign = diff > 0 ? "+" : "";
            var color = diff > 0 ? "#C9572E" : (diff < 0 ? "#3B6FB6" : "var(--text-sub)");
            priceEl.style.color = color;
            priceEl.textContent =
              price.toLocaleString() + "원 (" + sign + pct.toFixed(2) + "%)";
            lastPrices[s.code] = price;
            updateTotal(s.code);
          } else {
            priceEl.textContent = "조회 실패";
          }
        })
        .catch(function () {
          var priceEl = document.getElementById("price-" + s.code);
          if (priceEl) priceEl.textContent = "조회 실패";
        });
    });

    Promise.all(promises).then(function () {
      if (btn) {
        btn.disabled = false;
        btn.textContent = "↻ 시세 불러오기";
      }
    });
  }

  // ---------- 섹션 렌더링 ----------
  function makeCard(name, desc, url, onDelete, onMoveUp, onMoveDown, isFirst, isLast) {
    var card = document.createElement("div");
    card.className = "card";

    var a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.innerHTML = '<div class="card-text"><div class="name"></div><div class="desc"></div></div>';
    a.querySelector(".name").textContent = name;
    a.querySelector(".desc").textContent = desc;

    var arrow = document.createElement("span");
    arrow.className = "arrow";
    arrow.textContent = "→";

    var itemUp = document.createElement("button");
    itemUp.className = "move-btn";
    itemUp.textContent = "↑";
    itemUp.title = "위로 이동";
    itemUp.disabled = !!isFirst;
    itemUp.onclick = function () { onMoveUp(); };

    var itemDown = document.createElement("button");
    itemDown.className = "move-btn";
    itemDown.textContent = "↓";
    itemDown.title = "아래로 이동";
    itemDown.disabled = !!isLast;
    itemDown.onclick = function () { onMoveDown(); };

    var del = document.createElement("button");
    del.className = "del-btn";
    del.textContent = "삭제";
    del.onclick = function () { onDelete(); };

    card.appendChild(a);
    card.appendChild(arrow);
    card.appendChild(itemUp);
    card.appendChild(itemDown);
    card.appendChild(del);
    return card;
  }

  function moveSection(idx, dir) {
    var newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= data.sections.length) return;
    var tmp = data.sections[idx];
    data.sections[idx] = data.sections[newIdx];
    data.sections[newIdx] = tmp;
    saveData(data);
    renderSections();
  }

  function renderSections() {
    var root = document.getElementById("sections");
    root.innerHTML = "";

    data.sections.forEach(function (section, idx) {
      if (section.type === "stocks") {
        root.appendChild(buildStockSection(section, idx));
      } else {
        root.appendChild(buildLinkSection(section, idx));
      }
    });
  }

  function buildSectionTitle(title, idx, toggleLabel) {
    var titleRow = document.createElement("div");
    titleRow.className = "section-title";

    var titleSpan = document.createElement("span");
    titleSpan.textContent = title;
    titleRow.appendChild(titleSpan);

    var actions = document.createElement("div");
    actions.className = "section-actions";

    var upBtn = document.createElement("button");
    upBtn.className = "move-btn";
    upBtn.textContent = "↑";
    upBtn.title = "위로 이동";
    upBtn.disabled = idx === 0;
    upBtn.onclick = function () { moveSection(idx, -1); };

    var downBtn = document.createElement("button");
    downBtn.className = "move-btn";
    downBtn.textContent = "↓";
    downBtn.title = "아래로 이동";
    downBtn.disabled = idx === data.sections.length - 1;
    downBtn.onclick = function () { moveSection(idx, 1); };

    var toggleBtn = document.createElement("button");
    toggleBtn.className = "add-toggle";
    toggleBtn.textContent = toggleLabel;

    actions.appendChild(upBtn);
    actions.appendChild(downBtn);
    actions.appendChild(toggleBtn);
    titleRow.appendChild(actions);

    return { titleRow: titleRow, toggleBtn: toggleBtn };
  }

  function buildStockSection(section, idx) {
    var wrap = document.createElement("div");
    wrap.className = "section";

    var titleParts = buildSectionTitle(section.title, idx, "+ 종목 추가");
    wrap.appendChild(titleParts.titleRow);

    var list = document.createElement("div");
    list.className = "card-list";
    section.items.forEach(function (s, itemIdx) {
      list.appendChild(makeCard(
        s.name,
        "네이버 증권 - 실시간 시세 (" + s.code + ")",
        "https://finance.naver.com/item/main.naver?code=" + s.code,
        function () {
          section.items.splice(itemIdx, 1);
          saveData(data);
          renderTickerTape();
          renderSections();
        },
        function () {
          if (itemIdx === 0) return;
          var tmp = section.items[itemIdx];
          section.items[itemIdx] = section.items[itemIdx - 1];
          section.items[itemIdx - 1] = tmp;
          saveData(data);
          renderTickerTape();
          renderSections();
        },
        function () {
          if (itemIdx === section.items.length - 1) return;
          var tmp = section.items[itemIdx];
          section.items[itemIdx] = section.items[itemIdx + 1];
          section.items[itemIdx + 1] = tmp;
          saveData(data);
          renderTickerTape();
          renderSections();
        },
        itemIdx === 0,
        itemIdx === section.items.length - 1
      ));
    });
    wrap.appendChild(list);

    var form = document.createElement("div");
    form.className = "add-form";
    form.innerHTML =
      '<input type="text" placeholder="종목코드 (예: 005930)" maxlength="6" class="f-code">' +
      '<input type="text" placeholder="종목명 (예: 삼성전자)" class="f-name">' +
      '<button type="button" class="f-submit">추가</button>' +
      '<div class="hint">종목코드는 네이버 증권에서 종목명 검색 후 URL의 6자리 숫자를 확인하세요.</div>';
    wrap.appendChild(form);

    titleParts.toggleBtn.onclick = function () { form.classList.toggle("open"); };
    form.querySelector(".f-submit").onclick = function () {
      var code = form.querySelector(".f-code").value.trim();
      var name = form.querySelector(".f-name").value.trim();
      if (!/^\d{6}$/.test(code) || !name) {
        alert("종목코드는 숫자 6자리, 종목명을 입력해주세요.");
        return;
      }
      section.items.push({ code: code, name: name });
      saveData(data);
      renderTickerTape();
      renderSections();
    };

    return wrap;
  }

  function buildLinkSection(section, idx) {
    var wrap = document.createElement("div");
    wrap.className = "section";

    var titleParts = buildSectionTitle(section.title, idx, "+ 추가");
    wrap.appendChild(titleParts.titleRow);

    var list = document.createElement("div");
    list.className = "card-list";
    section.items.forEach(function (item, itemIdx) {
      list.appendChild(makeCard(
        item.name,
        item.desc,
        item.url,
        function () {
          section.items.splice(itemIdx, 1);
          saveData(data);
          renderSections();
        },
        function () {
          if (itemIdx === 0) return;
          var tmp = section.items[itemIdx];
          section.items[itemIdx] = section.items[itemIdx - 1];
          section.items[itemIdx - 1] = tmp;
          saveData(data);
          renderSections();
        },
        function () {
          if (itemIdx === section.items.length - 1) return;
          var tmp = section.items[itemIdx];
          section.items[itemIdx] = section.items[itemIdx + 1];
          section.items[itemIdx + 1] = tmp;
          saveData(data);
          renderSections();
        },
        itemIdx === 0,
        itemIdx === section.items.length - 1
      ));
    });
    wrap.appendChild(list);

    var form = document.createElement("div");
    form.className = "add-form";
    form.innerHTML =
      '<input type="text" placeholder="이름 (예: 내가 찾은 채널)" class="f-name">' +
      '<input type="text" placeholder="설명 (선택)" class="f-desc">' +
      '<input type="text" placeholder="URL (https://... )" class="f-url">' +
      '<button type="button" class="f-submit">추가</button>';
    wrap.appendChild(form);

    titleParts.toggleBtn.onclick = function () { form.classList.toggle("open"); };
    form.querySelector(".f-submit").onclick = function () {
      var name = form.querySelector(".f-name").value.trim();
      var desc = form.querySelector(".f-desc").value.trim();
      var url = form.querySelector(".f-url").value.trim();
      if (!name || !url) {
        alert("이름과 URL을 입력해주세요.");
        return;
      }
      if (!/^https?:\/\//.test(url)) url = "https://" + url;
      section.items.push({ name: name, desc: desc, url: url });
      saveData(data);
      renderSections();
    };

    return wrap;
  }
</script>
