<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 정보 모음 - 운전 중 듣기</title>
<style>
  :root {
    --bg: #F4F1EA;
    --card-bg: #FFFFFF;
    --border: #E0DCD2;
    --text-main: #2C2A26;
    --text-sub: #7A766C;
    --accent: #C9572E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text-main);
    overflow-x: auto;
    min-width: 320px;
  }
  .app-layout {
    display: flex;
    align-items: flex-start;
    gap: 0;
    min-height: 100vh;
  }

  /* ===== 상단 차트 바 ===== */
  .chart-bar {
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
    height: 230px;
    flex-shrink: 0;
  }
  .chart-item {
    flex: 0 0 260px;
    border-right: 1px solid var(--border);
    padding: 6px 8px 4px;
    display: flex;
    flex-direction: column;
  }
  .chart-item:last-child { border-right: none; }
  .chart-period-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    width: max-content;
    min-width: 100%;
  }
  .chart-period-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin-right: 4px;
  }
  .period-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
  }
  .period-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .chart-item {
    flex: 0 0 280px;
    border-right: 1px solid var(--border);
    padding: 6px 12px 4px;
    display: flex;
    flex-direction: column;
  }
  .chart-item:last-child { border-right: none; }
  .chart-item-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 4px;
  }
  .page-wrap {
    display: flex;
    flex-direction: column;
    width: max-content;
    min-width: 100vw;
  }
  /* 왼쪽: 주식 허브 */
  .hub-panel {
    flex: 0 0 480px;
    min-width: 320px;
    padding: 24px 16px 60px;
    border-right: 2px solid var(--border);
    min-height: 100vh;
  }
  /* 오른쪽: 링크 보관함 */
  .linkbox-panel {
    flex: 1;
    min-width: 320px;
    padding: 24px 16px 60px;
    min-height: 100vh;
    border-right: 2px solid var(--border);
  }
  .memo-panel {
    flex: 0 0 360px;
    min-width: 300px;
    padding: 24px 16px 60px;
    min-height: 100vh;
    border-right: 2px solid var(--border);
  }
  .memo-panel header { margin-bottom: 20px; }
  .memo-panel header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .memo-panel header p { font-size: 14px; color: var(--text-sub); }

  /* 뉴스 패널 */
  .news-panel {
    flex: 0 0 380px;
    min-width: 300px;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  .news-panel header { margin-bottom: 16px; }
  .news-panel header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .news-panel header p { font-size: 14px; color: var(--text-sub); }
  .news-source-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .news-source-btn {
    padding: 5px 12px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--card-bg);
    font-size: 12px; font-weight: 600; color: var(--text-sub); cursor: pointer;
  }
  .news-source-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .news-refresh-btn {
    width: 100%; padding: 10px; margin-bottom: 14px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--card-bg); color: var(--accent);
    font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .news-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    text-decoration: none; color: inherit; display: block;
    transition: border-color 0.15s ease;
  }
  .news-card:hover { border-color: var(--accent); }
  .news-card-source {
    font-size: 11px; font-weight: 700; color: var(--accent);
    margin-bottom: 4px; text-transform: uppercase;
  }
  .news-card-title {
    font-size: 15px; font-weight: 800; color: var(--text-main);
    line-height: 1.4; margin-bottom: 6px;
  }
  .news-card-date { font-size: 11px; color: var(--text-sub); }
  .news-loading { text-align: center; color: var(--text-sub); font-size: 14px; padding: 30px 0; }
  .memo-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .memo-item-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-main);
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 8px;
  }
  .memo-item-date {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 8px;
  }
  .memo-item-actions {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .memo-write-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .memo-write-box textarea {
    width: 100%;
    min-height: 100px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  header { margin-bottom: 28px; }
  header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  header p { font-size: 14px; color: var(--text-sub); }
  .section { margin-bottom: 28px; }
  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 21px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }
  .card:active { transform: scale(0.98); }
  .card a {
    flex: 1;
    text-decoration: none;
    color: inherit;
    min-width: 0;
  }
  .card-text .name { font-size: 19px; font-weight: 800; margin-bottom: 2px; color: var(--text-main); }
  .card-text .desc { font-size: 12px; color: var(--text-sub); }
  .arrow { font-size: 18px; color: var(--text-sub); margin: 0 8px 0 12px; flex-shrink: 0; }
  .del-btn {
    margin-left: 4px;
    padding: 6px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text-sub);
    cursor: pointer;
    flex-shrink: 0;
  }
  .add-toggle {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    text-transform: none;
    letter-spacing: normal;
  }
  .section-actions {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .move-btn {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    line-height: 1;
    cursor: pointer;
    text-transform: none;
    letter-spacing: normal;
  }
  .move-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }
  .add-form {
    display: none;
    flex-direction: column;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .add-form.open { display: flex; }
  .add-form input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
  }
  .add-form button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .add-form .hint { font-size: 12px; color: var(--text-sub); }
  .note-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .note-card .note-text {
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-main);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .note-card .note-actions {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .note-form textarea {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
    min-height: 70px;
    font-family: inherit;
    resize: vertical;
  }
  footer { margin-top: 40px; font-size: 12px; color: var(--text-sub); text-align: center; }

  /* ===== 오른쪽 패널 영역 ===== */
  .right-area {
    flex: 1;
    min-width: 320px;
    display: flex;
    flex-direction: column;
  }
  .panels-container {
    display: flex;
    flex: 1;
    align-items: flex-start;
  }
  .slide-panel {
    flex: 0 0 380px;
    min-width: 300px;
    padding: 24px 16px 60px;
    border-right: 2px solid var(--border);
    box-sizing: border-box;
    min-height: 100vh;
  }
  .slide-panel:last-child { border-right: none; }
  .panel-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 21px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 16px;
  }
  .panel-title-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ===== 링크 보관함 ===== */
  .linkbox-panel header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .linkbox-panel header p { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; }
  .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-box input {
    flex: 1; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; background: var(--card-bg);
  }
  .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card-bg);
    font-size: 13px; font-weight: 600; color: var(--text-sub); cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .add-category-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px dashed var(--border); background: none;
    font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer;
  }
  .link-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  }
  .link-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .link-card-title {
    font-size: 16px; font-weight: 800; color: var(--text-main);
    margin-bottom: 4px; text-decoration: none; display: block;
  }
  .link-card-title:hover { color: var(--accent); }
  .link-card-url {
    font-size: 12px; color: var(--text-sub); margin-bottom: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px;
  }
  .link-card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
  .link-card-category {
    font-size: 11px; font-weight: 700;
    background: #FCE9E0; color: var(--accent); border-radius: 6px; padding: 2px 8px;
  }
  .link-card-memo { font-size: 12px; color: var(--text-sub); }
  .link-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    width: 28px; height: 28px; font-size: 13px; cursor: pointer; color: var(--text-sub);
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lb-add-form {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px;
    display: none; flex-direction: column; gap: 10px;
  }
  .lb-add-form.open { display: flex; }
  .lb-add-form input, .lb-add-form textarea, .lb-add-form select {
    padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; width: 100%;
  }
  .lb-add-form textarea { min-height: 60px; resize: vertical; }
  .lb-form-btns { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .btn-secondary {
    padding: 10px 16px; background: none; color: var(--text-sub);
    border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .lb-fab {
    width: 100%; padding: 14px; border: 1.5px dashed var(--border);
    border-radius: 12px; background: none; color: var(--accent);
    font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px;
  }
  .empty-msg { text-align: center; color: var(--text-sub); font-size: 14px; padding: 40px 0; }
</style>
</head>
<body>

<div class="app-layout">

<!-- ===== 왼쪽: 주식 허브 ===== -->
<div class="hub-panel">

<header>
  <h1>주식 정보 허브</h1>
  <p>운전하면서 들을 수 있는 시황·뉴스 모음. 각 섹션에서 자유롭게 추가/삭제할 수 있어요.</p>
</header>

<div id="stock-ticker-section" class="section">
  <div class="section-title">관심 종목 실시간 시세</div>
  <div id="tv-ticker-tape"></div>
</div>

<div id="sections"></div>

<div class="section">
  <button id="add-section-btn" style="width:100%; padding:14px; border:1.5px dashed var(--border); border-radius:12px; background:none; color:var(--accent); font-weight:700; font-size:15px; cursor:pointer;">+ 새 섹션 추가</button>
</div>

<footer>
  즐겨찾기에 추가해두고 운전 시작 전 / 쉬는 시간에 확인하세요.<br>
  여러 기기에서 실시간으로 동기화됩니다.
</footer>

</div><!-- /hub-panel -->

<!-- ===== 오른쪽: 패널 영역 ===== -->
<div class="right-area">

  <div class="panels-container" id="panels-container">

  function updateTotal(code) {
    var stockSection = data.sections.filter(function (s) { return s.type === "stocks"; })[0];
    var stock = (stockSection && stockSection.items ? stockSection.items : []).filter(function (s) { return s.code === code; })[0];
    var totalEl = document.getElementById("total-" + code);
    if (!stock || !totalEl) return;

    var price = lastPrices[code];
    var qty = stock.qty || 0;

    if (qty === 0) {
      totalEl.textContent = "";
    } else if (price == null) {
      totalEl.textContent = "총액 — (시세 불러오기 필요)";
    } else {
      totalEl.textContent = "총액 " + (price * qty).toLocaleString() + "원";
    }

    updateGrandTotal();
  }

  function updateGrandTotal() {
    var grandTotalValue = document.getElementById("grand-total");
    if (!grandTotalValue) return;

    var stockSection = data.sections.filter(function (s) { return s.type === "stocks"; })[0];
    var stocks = (stockSection && stockSection.items) ? stockSection.items : [];

    var sum = 0;
    var hasQty = false;
    var allPricesReady = true;

    stocks.forEach(function (s) {
      var qty = s.qty || 0;
      if (qty > 0) {
        hasQty = true;
        var price = lastPrices[s.code];
        if (price == null) {
          allPricesReady = false;
        } else {
          sum += price * qty;
        }
      }
    });

    if (!hasQty) {
      grandTotalValue.textContent = "보유 수량을 입력해주세요";
    } else if (!allPricesReady) {
      grandTotalValue.textContent = "— (시세 불러오기 필요)";
    } else {
      grandTotalValue.textContent = sum.toLocaleString() + "원";
    }
  }

  // 야후 파이낸스 + CORS 프록시(여러 개 순차 시도)로 시세 조회
  function fetchYahoo(symbol, proxyIdx) {
    var target = "https://query1.finance.yahoo.com/v8/finance/chart/" + symbol;
    var proxies = [
      "https://corsproxy.io/?url=" + encodeURIComponent(target),
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(target),
      "https://thingproxy.freeboard.io/fetch/" + target
    ];
    if (proxyIdx >= proxies.length) {
      return Promise.reject(new Error("all proxies failed"));
    }
    return fetch(proxies[proxyIdx])
      .then(function (res) {
        if (!res.ok) throw new Error("bad status");
        return res.json();
      })
      .catch(function () {
        return fetchYahoo(symbol, proxyIdx + 1);
      });
  }

  function fetchAllPrices(stocks, btn) {
    if (btn) {
      btn.disabled = true;
      btn.textContent = "불러오는 중...";
    }

    stocks.forEach(function (s) {
      var priceEl = document.getElementById("price-" + s.code);
      if (priceEl) {
        priceEl.style.color = "var(--text-sub)";
        priceEl.textContent = "로딩중...";
      }
    });

    var symbol;
    var promises = stocks.map(function (s) {
      symbol = s.code + ".KS";
      return fetchYahoo(symbol, 0)
        .then(function (json) {
          var result = json.chart && json.chart.result && json.chart.result[0];
          var meta = result && result.meta;
          var priceEl = document.getElementById("price-" + s.code);
          if (!priceEl) return;
          if (meta && typeof meta.regularMarketPrice === "number") {
            var price = meta.regularMarketPrice;
            var prevClose = meta.previousClose || meta.chartPreviousClose;
            var diff = prevClose ? price - prevClose : 0;
            var pct = prevClose ? (diff / prevClose * 100) : 0;
            var sign = diff > 0 ? "+" : "";
            var color = diff > 0 ? "#C9572E" : (diff < 0 ? "#3B6FB6" : "var(--text-sub)");
            priceEl.style.color = color;
            priceEl.textContent =
              price.toLocaleString() + "원 (" + sign + pct.toFixed(2) + "%)";
            lastPrices[s.code] = price;
            updateTotal(s.code);
          } else {
            priceEl.textContent = "조회 실패";
          }
        })
        .catch(function () {
          var priceEl = document.getElementById("price-" + s.code);
          if (priceEl) priceEl.textContent = "조회 실패";
        });
    });

    Promise.all(promises).then(function () {
      if (btn) {
        btn.disabled = false;
        btn.textContent = "↻ 시세 불러오기";
      }
    });
  }

  function makeCard(name, desc, url, onDelete, onMoveUp, onMoveDown, isFirst, isLast) {
    var card = document.createElement("div");
    card.className = "card";

    var a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.innerHTML = '<div class="card-text"><div class="name"></div><div class="desc"></div></div>';
    a.querySelector(".name").textContent = name;
    a.querySelector(".desc").textContent = desc;

    itemUp.className = "move-btn";
    itemUp.textContent = "↑";
    itemUp.title = "위로 이동";
    itemUp.disabled = !!isFirst;
    itemUp.onclick = function () { onMoveUp(); };

    var itemDown = document.createElement("button");
    itemDown.className = "move-btn";
    itemDown.textContent = "↓";
    itemDown.title = "아래로 이동";
    itemDown.disabled = !!isLast;

  function moveSection(idx, dir) {
    var newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= data.sections.length) return;
    var tmp = data.sections[idx];
    data.sections[idx] = data.sections[newIdx];
    data.sections[newIdx] = tmp;
    saveData(data);
    renderSections();
  }

  function renderSections() {
    var root = document.getElementById("sections");
    root.innerHTML = "";

    data.sections.forEach(function (section, idx) {
      if (section.type === "stocks") {
        root.appendChild(buildStockSection(section, idx));
      } else if (section.type === "notes") {
        root.appendChild(buildNoteSection(section, idx));
      } else {
        root.appendChild(buildLinkSection(section, idx));
      }
    });
  }

  function deleteSection(idx) {
    var section = data.sections[idx];
    var ok = confirm('"' + section.title + '" 섹션을 삭제하시겠습니까?\n안의 항목들도 모두 사라집니다.');
    if (!ok) return;
    data.sections.splice(idx, 1);
    saveData(data);
    renderSections();
  }

  function renameSection(idx) {
    var section = data.sections[idx];

  function buildSectionTitle(title, idx, toggleLabel, allowDelete) {
    var titleRow = document.createElement("div");

    var titleSpan = document.createElement("span");
    titleSpan.textContent = title;
    titleRow.appendChild(titleSpan);

    var actions = document.createElement("div");
    actions.className = "section-actions";

    var upBtn = document.createElement("button");
    upBtn.className = "move-btn";
    upBtn.textContent = "↑";
    upBtn.title = "위로 이동";
    upBtn.disabled = idx === 0;
    upBtn.onclick = function () { moveSection(idx, -1); };

    var downBtn = document.createElement("button");
    downBtn.className = "move-btn";
    downBtn.textContent = "↓";
    downBtn.title = "아래로 이동";
    downBtn.disabled = idx === data.sections.length - 1;
    downBtn.onclick = function () { moveSection(idx, 1); };

  // ===== 패널 순서 변경 JS =====
  var panelOrderRef = db.ref("panelOrder");

  function savePanelOrder() {
    var container = document.getElementById("panels-container");
    var panels = Array.from(container.querySelectorAll(".slide-panel"));
    var order = panels.map(function (p) { return p.id.replace("slide-", ""); });
    panelOrderRef.set(order);
  }

  function applyPanelOrder(order) {
    var container = document.getElementById("panels-container");
    order.forEach(function (key) {
      var panel = document.getElementById("slide-" + key);
      if (panel) container.appendChild(panel);
    });
    updatePanelBtns();
  }

  function updatePanelBtns() {
    var container = document.getElementById("panels-container");
    var panels = container.querySelectorAll(".slide-panel");
    panels.forEach(function (panel, idx) {
      var leftBtn = panel.querySelector(".panel-lr-btn[data-dir='-1']");
      var rightBtn = panel.querySelector(".panel-lr-btn[data-dir='1']");
      if (leftBtn) leftBtn.disabled = idx === 0;
      if (rightBtn) rightBtn.disabled = idx === panels.length - 1;
    });
  }

  document.getElementById("panels-container").addEventListener("click", function (e) {
    var btn = e.target.closest(".panel-lr-btn");
    if (!btn) return;
    var id = btn.dataset.id;
    var dir = parseInt(btn.dataset.dir);
    var container = document.getElementById("panels-container");
    var panels = Array.from(container.querySelectorAll(".slide-panel"));
    var idx = panels.findIndex(function (p) { return p.id === "slide-" + id; });
    var newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= panels.length) return;

    if (dir === 1) {
      container.insertBefore(panels[newIdx + 1] || null, panels[idx]);
      container.insertBefore(panels[idx], panels[newIdx]);
    } else {
      container.insertBefore(panels[idx], panels[newIdx]);
    }
    updatePanelBtns();
    savePanelOrder();
  });

  // Firebase에서 저장된 순서 불러오기
  panelOrderRef.once("value", function (snap) {
    var val = snap.val();
    if (val && Array.isArray(val) && val.length === 3) {
      applyPanelOrder(val);
    } else {
      updatePanelBtns();
    }
  });

  // ===== 링크 보관함 JS =====
  var lbLinksRef = db.ref("linkbox/links");
  var lbCatsRef = db.ref("linkbox/categories");

  var lbLinks = [];
  var lbCategories = ["전체", "유튜브", "뉴스", "공부", "기타"];
  var lbActiveCategory = "전체";
  var lbSearchQuery = "";
  var lbEditingId = null;

  lbCatsRef.on("value", function (snap) {
    var val = snap.val();
    if (val && Array.isArray(val)) {
      lbCategories = ["전체"].concat(val.filter(function (c) { return c !== "전체"; }));
    } else {
      lbCategories = ["전체", "유튜브", "뉴스", "공부", "기타"];
      lbCatsRef.set(lbCategories.filter(function (c) { return c !== "전체"; }));
    }
    lbRenderTabs();
    lbRenderCategorySelect();
  });

  lbLinksRef.on("value", function (snap) {
    var val = snap.val();
    lbLinks = val ? Object.keys(val).map(function (k) {
      return Object.assign({ id: k }, val[k]);
    }).reverse() : [];
    lbRenderLinks();
  });

  function lbGetThumbnail(url) {
    // 유튜브 썸네일
    var ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) {
      return "https://img.youtube.com/vi/" + ytMatch[1] + "/mqdefault.jpg";
    }
    // 일반 URL: Google 페이지 스크린샷 API
    return "https://www.google.com/s2/favicons?sz=64&domain=" + encodeURIComponent(url);
  }

  function lbIsYoutube(url) {
    return /youtube\.com|youtu\.be/.test(url);
  }

  function lbSaveLink(link) {
    if (link.id) {
      lbLinksRef.child(link.id).set({ title: link.title, url: link.url, category: link.category, memo: link.memo, createdAt: link.createdAt || Date.now() });
    } else {
      lbLinksRef.push({ title: link.title, url: link.url, category: link.category, memo: link.memo, createdAt: Date.now() });
    }
  }

  function lbDeleteLink(id) {
    if (!confirm("이 링크를 삭제하시겠습니까?")) return;
    lbLinksRef.child(id).remove();
  }

  function lbRenderTabs() {
    var tabs = document.getElementById("lb-category-tabs");
    if (!tabs) return;
    tabs.innerHTML = "";
    lbCategories.forEach(function (cat) {
      var btn = document.createElement("button");
      btn.className = "tab-btn" + (cat === lbActiveCategory ? " active" : "");
      btn.textContent = cat;
      btn.onclick = function () { lbActiveCategory = cat; lbRenderTabs(); lbRenderLinks(); };
      tabs.appendChild(btn);
    });
    var addCatBtn = document.createElement("button");
    addCatBtn.className = "add-category-btn";
    addCatBtn.textContent = "+ 분류";
    addCatBtn.onclick = function () {
      var name = prompt("새 분류 이름을 입력하세요");
      if (!name || !name.trim()) return;
      if (lbCategories.includes(name.trim())) { alert("이미 존재하는 분류입니다."); return; }
      lbCategories.push(name.trim());
      lbCatsRef.set(lbCategories.filter(function (c) { return c !== "전체"; }));
    };
    tabs.appendChild(addCatBtn);
  }

  function lbRenderCategorySelect() {
    var sel = document.getElementById("lb-f-category");
    if (!sel) return;
    var current = sel.value;
    sel.innerHTML = '<option value="">분류 선택</option>';
    lbCategories.filter(function (c) { return c !== "전체"; }).forEach(function (cat) {
      var opt = document.createElement("option");
      opt.value = cat; opt.textContent = cat;
      if (cat === current) opt.selected = true;
      sel.appendChild(opt);
    });
    var delOpt = document.createElement("option");
    delOpt.value = "__delete__"; delOpt.textContent = "── 분류 삭제 ──";
    sel.appendChild(delOpt);
  }

  function lbRenderLinks() {
    var list = document.getElementById("lb-link-list");
    if (!list) return;
    list.innerHTML = "";
    var filtered = lbLinks.filter(function (l) {
      var matchCat = lbActiveCategory === "전체" || l.category === lbActiveCategory;
      var q = lbSearchQuery.toLowerCase();
      var matchSearch = !q || (l.title && l.title.toLowerCase().includes(q)) || (l.url && l.url.toLowerCase().includes(q)) || (l.memo && l.memo.toLowerCase().includes(q));
      return matchCat && matchSearch;
    });
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-msg">저장된 링크가 없습니다.<br>아래 버튼으로 추가해보세요.</div>';
      return;
    }
    filtered.forEach(function (link) {
      var card = document.createElement("div");
      card.className = "link-card";

      // 썸네일 (유튜브는 크게, 일반은 파비콘)
      var thumb = lbGetThumbnail(link.url);
      var isYt = lbIsYoutube(link.url);

      if (isYt) {
        var thumbImg = document.createElement("img");
        thumbImg.src = thumb;
        thumbImg.style.width = "100%";
        thumbImg.style.borderRadius = "8px";
        thumbImg.style.marginBottom = "10px";
        thumbImg.style.display = "block";
        thumbImg.style.objectFit = "cover";
        thumbImg.style.maxHeight = "160px";
        thumbImg.onerror = function () { this.style.display = "none"; };
        card.appendChild(thumbImg);
      }

      var top = document.createElement("div");
      top.className = "link-card-top";
      var info = document.createElement("div");
      info.style.flex = "1"; info.style.minWidth = "0";

      // 파비콘 + 제목 한 줄
      var titleRow = document.createElement("div");
      titleRow.style.display = "flex";
      titleRow.style.alignItems = "center";
      titleRow.style.gap = "6px";
      titleRow.style.marginBottom = "4px";

      if (!isYt) {
        var favicon = document.createElement("img");
        favicon.src = thumb;
        favicon.style.width = "16px";
        favicon.style.height = "16px";
        favicon.style.borderRadius = "3px";
        favicon.style.flexShrink = "0";
        favicon.onerror = function () { this.style.display = "none"; };
        titleRow.appendChild(favicon);
      }

      var titleA = document.createElement("a");
      titleA.className = "link-card-title";
      titleA.href = link.url; titleA.target = "_blank";
      titleA.textContent = link.title || link.url;
      titleA.style.marginBottom = "0";
      titleRow.appendChild(titleA);

      var urlEl = document.createElement("div");
      urlEl.className = "link-card-url"; urlEl.textContent = link.url;
      var meta = document.createElement("div");
      meta.className = "link-card-meta";
      if (link.category) {
        var catBadge = document.createElement("span");
        catBadge.className = "link-card-category"; catBadge.textContent = link.category;
        meta.appendChild(catBadge);
      }
      if (link.memo) {
        var memoEl = document.createElement("span");
        memoEl.className = "link-card-memo"; memoEl.textContent = link.memo;
        meta.appendChild(memoEl);
      }
      info.appendChild(titleRow); info.appendChild(urlEl); info.appendChild(meta);
      var actions = document.createElement("div");
      actions.className = "link-card-actions";
      var editBtn = document.createElement("button");
      editBtn.className = "icon-btn"; editBtn.textContent = "✎"; editBtn.title = "수정";
      editBtn.onclick = function () { lbOpenEditForm(link); };
      var delBtn = document.createElement("button");
      delBtn.className = "icon-btn"; delBtn.textContent = "✕"; delBtn.title = "삭제";
      delBtn.onclick = function () { lbDeleteLink(link.id); };
      actions.appendChild(editBtn); actions.appendChild(delBtn);
      top.appendChild(info); top.appendChild(actions);
      card.appendChild(top);
      list.appendChild(card);
    });
  }

  function lbOpenAddForm() {
    lbEditingId = null;
    document.getElementById("lb-f-title").value = "";
    document.getElementById("lb-f-url").value = "";
    document.getElementById("lb-f-category").value = "";
    document.getElementById("lb-f-memo").value = "";
    document.getElementById("lb-f-submit").textContent = "저장";
    document.getElementById("lb-add-form").classList.add("open");
    document.getElementById("lb-f-title").focus();
  }

  function lbOpenEditForm(link) {
    lbEditingId = link.id;
    document.getElementById("lb-f-title").value = link.title || "";
    document.getElementById("lb-f-url").value = link.url || "";
    document.getElementById("lb-f-category").value = link.category || "";
    document.getElementById("lb-f-memo").value = link.memo || "";
    document.getElementById("lb-f-submit").textContent = "수정 저장";
    document.getElementById("lb-add-form").classList.add("open");
    document.getElementById("lb-f-title").focus();
  }

  function lbCloseForm() {
    lbEditingId = null;
    document.getElementById("lb-add-form").classList.remove("open");
  }

  document.getElementById("lb-add-btn").onclick = lbOpenAddForm;
  document.getElementById("lb-f-cancel").onclick = lbCloseForm;

  document.getElementById("lb-f-submit").onclick = function () {
    var title = document.getElementById("lb-f-title").value.trim();
    var url = document.getElementById("lb-f-url").value.trim();
    var category = document.getElementById("lb-f-category").value;
    var memo = document.getElementById("lb-f-memo").value.trim();
    if (!title || !url) { alert("제목과 URL은 필수입니다."); return; }
    if (category === "__delete__") { alert("분류를 선택해주세요."); return; }
    if (!/^https?:\/\//.test(url)) url = "https://" + url;
    lbSaveLink({ id: lbEditingId, title: title, url: url, category: category, memo: memo });
    lbCloseForm();
  };

  document.getElementById("lb-f-category").onchange = function () {
    if (this.value === "__delete__") {
      var name = prompt("삭제할 분류 이름을 입력하세요");
      if (!name || !name.trim()) { this.value = ""; return; }
      if (!lbCategories.includes(name.trim())) { alert("존재하지 않는 분류입니다."); this.value = ""; return; }
      if (!confirm('"' + name.trim() + '" 분류를 삭제하시겠습니까?')) { this.value = ""; return; }
      lbCategories = lbCategories.filter(function (c) { return c !== name.trim(); });
      lbCatsRef.set(lbCategories.filter(function (c) { return c !== "전체"; }));
      this.value = "";
    }
  };

  document.getElementById("lb-search").oninput = function () {
    lbSearchQuery = this.value;
    lbRenderLinks();
  };

  // ===== 경제 뉴스 JS =====
  var NEWS_SOURCES = {
    economy:  { name: "경제 종합",    url: "https://news.google.com/search?q=%EA%B2%BD%EC%A0%9C+%EC%A3%BC%EC%8B%9D&hl=ko&gl=KR&ceid=KR:ko" },
    stock:    { name: "코스피·코스닥", url: "https://news.google.com/search?q=%EC%BD%94%EC%8A%A4%ED%94%BC+%EC%BD%94%EC%8A%A4%EB%8B%A5&hl=ko&gl=KR&ceid=KR:ko" },
    finance:  { name: "금리·환율",    url: "https://news.google.com/search?q=%EA%B8%88%EB%A6%AC+%ED%99%98%EC%9C%A8+%ED%95%9C%EA%B5%AD%EC%9D%80%ED%96%89&hl=ko&gl=KR&ceid=KR:ko" },
    usa:      { name: "미국 증시",    url: "https://news.google.com/search?q=%EB%82%98%EC%8A%A4%EB%8B%A5+%EB%89%B4%EC%9A%95%EC%A6%9D%EC%8B%9C&hl=ko&gl=KR&ceid=KR:ko" },
    semi:     { name: "반도체",       url: "https://news.google.com/search?q=%EB%B0%98%EB%8F%84%EC%B2%B4+%EC%82%BC%EC%84%B1+SK%ED%95%98%EC%9D%B4%EB%8B%89%EC%8A%A4&hl=ko&gl=KR&ceid=KR:ko" },
    fed:      { name: "Fed·FOMC",    url: "https://news.google.com/search?q=FOMC+%EC%97%B0%EC%A4%80+%EA%B8%88%EB%A6%AC&hl=ko&gl=KR&ceid=KR:ko" }
  };

  var newsActiveSource = "all";

  function newsRender() {
    var list = document.getElementById("news-list");
    if (!list) return;
    list.innerHTML = "";

    var sources = newsActiveSource === "all"
      ? Object.keys(NEWS_SOURCES)
      : [newsActiveSource];

    sources.forEach(function (key) {
      var src = NEWS_SOURCES[key];
      var a = document.createElement("a");
      a.className = "news-card";
      a.href = src.url;
      a.target = "_blank";

      var badge = document.createElement("div");
      badge.className = "news-card-source";
      badge.textContent = src.name;

      var title = document.createElement("div");
      title.className = "news-card-title";
      title.textContent = "구글 뉴스에서 \"" + src.name + "\" 최신 기사 보기 →";

      var desc = document.createElement("div");
      desc.className = "news-card-date";
      desc.textContent = "클릭하면 구글 뉴스로 이동합니다";

      a.appendChild(badge);
      a.appendChild(title);
      a.appendChild(desc);
      list.appendChild(a);
    });
  }

  function newsLoadAll() {
    newsRender();
  }


  document.getElementById("news-refresh-btn").onclick = function () {
    var src = newsActiveSource === "all"
      ? "https://news.google.com/search?q=%EA%B2%BD%EC%A0%9C+%EC%A3%BC%EC%8B%9D&hl=ko&gl=KR&ceid=KR:ko"
      : NEWS_SOURCES[newsActiveSource].url;
    window.open(src, "_blank");
  };

  document.getElementById("news-source-tabs").onclick = function (e) {
    var btn = e.target.closest(".news-source-btn");
    if (!btn) return;
    document.querySelectorAll(".news-source-btn").forEach(function (b) { b.classList.remove("active"); });
    btn.classList.add("active");
    newsActiveSource = btn.dataset.source;
    newsRender();
  };

  // 페이지 로드 시 즉시 렌더링
  newsRender();

  // ===== 메모장 JS =====
  var memoRef = db.ref("memopad");
  var memoList = [];
  var memoEditingId = null;

  memoRef.on("value", function (snap) {
    var val = snap.val();
    memoList = val ? Object.keys(val).map(function (k) {
      return Object.assign({ id: k }, val[k]);
    }).sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); }) : [];
    memoRenderList();
  });

  function memoSave(id, text, style) {
    var obj = { text: text, updatedAt: Date.now() };
    if (style) {
      obj.fontSize = style.fontSize || "15px";
      obj.color = style.color || "#2C2A26";
      obj.bgColor = style.bgColor || "#FFFFFF";
    }
    if (id) {
      memoRef.child(id).update(obj);
    } else {
      obj.createdAt = Date.now();
      memoRef.push(obj);
    }
  }

  function memoDelete(id) {
    if (!confirm("이 메모를 삭제하시겠습니까?")) return;
    memoRef.child(id).remove();
  }

  function memoRenderList() {
    var list = document.getElementById("memo-list");
    if (!list) return;
    list.innerHTML = "";

    if (memoList.length === 0) {
      list.innerHTML = '<div class="empty-msg">메모가 없습니다.<br>위에서 바로 작성해보세요.</div>';
      return;
    }

    memoList.forEach(function (memo) {
      var item = document.createElement("div");
      item.className = "memo-item";
      item.style.background = memo.bgColor || "#FFFFFF";

      var textEl = document.createElement("div");
      textEl.className = "memo-item-text";
      textEl.textContent = memo.text;
      textEl.style.fontSize = memo.fontSize || "15px";
      textEl.style.color = memo.color || "#2C2A26";

      var editArea = document.createElement("textarea");
      editArea.value = memo.text;
      editArea.style.display = "none";
      editArea.style.width = "100%";
      editArea.style.minHeight = "80px";
      editArea.style.padding = "10px 12px";
      editArea.style.border = "1px solid var(--border)";
      editArea.style.borderRadius = "8px";
      editArea.style.fontSize = memo.fontSize || "15px";
      editArea.style.fontFamily = "inherit";
      editArea.style.resize = "vertical";
      editArea.style.marginBottom = "8px";

      // 스타일 툴바
      var styleBar = document.createElement("div");
      styleBar.style.cssText = "display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;";

      var sizeLabel = document.createElement("span");
      sizeLabel.textContent = "크기";
      sizeLabel.style.cssText = "font-size:12px;color:var(--text-sub);";

      var sizeSelect = document.createElement("select");
      sizeSelect.style.cssText = "padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;";
      ["12px","13px","14px","15px","16px","18px","20px","24px"].forEach(function (sz) {
        var opt = document.createElement("option");
        opt.value = sz; opt.textContent = sz;
        if ((memo.fontSize || "15px") === sz) opt.selected = true;
        sizeSelect.appendChild(opt);
      });
      sizeSelect.onchange = function () {
        textEl.style.fontSize = this.value;
        editArea.style.fontSize = this.value;
        memo.fontSize = this.value;
        memoSave(memo.id, memo.text, memo);
      };

      var colorLabel = document.createElement("span");
      colorLabel.textContent = "글씨색";
      colorLabel.style.cssText = "font-size:12px;color:var(--text-sub);";

      var colorInput = document.createElement("input");
      colorInput.type = "color";
      colorInput.value = memo.color || "#2C2A26";
      colorInput.style.cssText = "width:32px;height:26px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:1px;";
      colorInput.onchange = function () {
        textEl.style.color = this.value;
        memo.color = this.value;
        memoSave(memo.id, memo.text, memo);
      };

      var bgLabel = document.createElement("span");
      bgLabel.textContent = "배경색";
      bgLabel.style.cssText = "font-size:12px;color:var(--text-sub);";

      var bgInput = document.createElement("input");
      bgInput.type = "color";
      bgInput.value = memo.bgColor || "#FFFFFF";
      bgInput.style.cssText = "width:32px;height:26px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:1px;";
      bgInput.onchange = function () {
        item.style.background = this.value;
        memo.bgColor = this.value;
        memoSave(memo.id, memo.text, memo);
      };

      styleBar.appendChild(sizeLabel);
      styleBar.appendChild(sizeSelect);
      styleBar.appendChild(colorLabel);
      styleBar.appendChild(colorInput);
      styleBar.appendChild(bgLabel);
      styleBar.appendChild(bgInput);

      var dateEl = document.createElement("div");
      dateEl.className = "memo-item-date";
      var d = new Date(memo.updatedAt || memo.createdAt || Date.now());
      dateEl.textContent = d.getFullYear() + "." + String(d.getMonth()+1).padStart(2,"0") + "." + String(d.getDate()).padStart(2,"0") + " " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");

      var actions = document.createElement("div");
      actions.className = "memo-item-actions";

      var editBtn = document.createElement("button");
      editBtn.className = "icon-btn";
      editBtn.textContent = "✎";
      editBtn.title = "수정";
      editBtn.onclick = function () {
        var isEditing = editArea.style.display !== "none";
        if (!isEditing) {
          textEl.style.display = "none";
          editArea.style.display = "block";
          editArea.focus();
          editBtn.textContent = "💾";
        } else {
          var newText = editArea.value.trim();
          if (!newText) { alert("내용을 입력해주세요."); return; }
          memo.text = newText;
          memoSave(memo.id, newText, memo);
          editBtn.textContent = "✎";
        }
      };

      var delBtn = document.createElement("button");
      delBtn.className = "icon-btn";
      delBtn.textContent = "✕";
      delBtn.title = "삭제";
      delBtn.onclick = function () { memoDelete(memo.id); };

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      item.appendChild(textEl);
      item.appendChild(editArea);
      item.appendChild(styleBar);
      item.appendChild(dateEl);
      item.appendChild(actions);
      list.appendChild(item);
    });
  }

  document.getElementById("memo-submit").onclick = function () {
    var text = document.getElementById("memo-input").value.trim();
    if (!text) { alert("내용을 입력해주세요."); return; }
    memoSave(null, text, { fontSize: "15px", color: "#2C2A26", bgColor: "#FFFFFF" });
    document.getElementById("memo-input").value = "";
  };
</script>

</body>
</html>
